name: Build and publish Linkstack image on Docker Hub

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 



jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Retrieve latest version from LinkStackOrg/linkstack repository
      - name: Get Latest LinkStack Version
        id: get_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/linkstackorg/linkstack/releases/latest | jq -r .tag_name)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            LINKSTACK_VERSION=${{ steps.get_version.outputs.VERSION }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/linkstack:${{ steps.get_version.outputs.VERSION }}
